name: CI

on:
  push:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC https://docs.npmjs.com/trusted-publishers#supported-cicd-providers

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Version
        id: vtl
        uses: mapped/action-vtl@latest
        with:
          baseVersion: '1.1.10'
          releasesBranch: master
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Set package version
        if: github.ref == 'refs/heads/master'
        run: npm version ${{ steps.vtl.outputs.ver_semVerNoMeta }} --no-git-tag-version

      - name: Publish to npm
        if: github.ref == 'refs/heads/master'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
